<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Phiếu Nhập Kho</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Times New Roman', Times, serif;
    background: #fff;
    color: #000;
  }

  .page {
    width: 210mm;
    min-height: 297mm;
    margin: 0 auto;
    padding: 10mm 15mm;
    background: #fff;
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    margin-bottom: 14px;
  }

  .header-logo {
    position: absolute;
    left: 0;
    top: 50%;
    transform: translateY(-50%);
  }

  .header-logo img {
    height: 60px;
    width: auto;
    display: block;
  }

  .header-center {
    text-align: center;
  }

  .header-right {
    position: absolute;
    right: 0;
    top: 50%;
    transform: translateY(-50%);
    text-align: center;
  }

  .header-right img {
    height: 60px;
    width: 60px;
    display: block;
  }

  .qr-label {
    font-size: 7pt;
    font-weight: bold;
    color: #000;
    margin-top: 3px;
    letter-spacing: 0.3px;
    text-align: center;
    white-space: nowrap;
  }

  .title {
    font-size: 17pt;
    font-weight: bold;
    color: #000;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .subtitle {
    font-size: 10pt;
    margin-top: 4px;
    color: #333;
  }

  /* Info lines */
  .info-line {
    margin: 6px 0;
    font-size: 10.5pt;
    color: #000;
    font-weight: bold;
  }

  .info-line .dotted {
    display: inline-block;
    width: 75%;
    border-bottom: 1px dotted #666;
    vertical-align: bottom;
    margin-left: 4px;
    min-height: 14px;
  }

  /* Table */
  table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 8px;
    font-size: 9.5pt;
  }

  thead tr th {
    border: 1px solid #000;
    padding: 5px 4px;
    text-align: center;
    font-weight: bold;
    background: #fff;
    color: #000;
  }

  tbody tr td {
    border: 1px solid #000;
    padding: 0 4px;
    height: 22px;
    vertical-align: middle;
  }

  .col-stt { width: 6%;  text-align: center; }
  .col-ten { width: 58%; }
  .col-dvt { width: 18%; text-align: center; }
  .col-sl  { width: 18%; text-align: center; }

  /* Signatures */
  .signatures {
    display: flex;
    justify-content: space-between;
    margin-top: 18px;
    text-align: center;
    font-size: 9pt;
    font-weight: bold;
    color: #000;
  }

  .sig-col {
    flex: 1;
  }

  .sig-col .sub {
    font-weight: normal;
    font-style: italic;
    color: #333;
    font-size: 8.5pt;
  }

  .sig-col .ten-ky {
    display: block;
    margin-top: 42px;
    font-weight: bold;
    font-size: 9pt;
    min-height: 14px;
  }

  .print-btn {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: green;
    color: #fff;
    border: none;
    padding: 12px 28px;
    font-size: 11pt;
    font-family: 'Times New Roman', Times, serif;
    font-weight: bold;
    cursor: pointer;
    border-radius: 4px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    z-index: 999;
  }

  .print-btn:hover { background: #005500; }

  @media print {
    body { background: #fff; }
    .page { margin: 0; padding: 10mm 15mm; width: 210mm; }
    .print-btn { display: none; }
  }
</style>
<script>
  function getParams() {
    const p = new URLSearchParams(window.location.search);
    return {
      tieude:    p.get('tieude')    || 'Phiếu Nhập Kho',
      ngay:      p.get('ngay')      || '',
      donvi:     p.get('donvi')     || '',
      daidien:   p.get('daidien')   || '',
      dienthoai: p.get('dienthoai') || '',
      lydo:      p.get('lydo')      || '',
      data:      p.get('data')      || '',
      qrdata:    p.get('qrdata')    || '',
      nhangiao:  p.get('nhangiao')  || 'Người giao hàng',
      nguoigiao: p.get('nguoigiao') || '',
      thukho:    p.get('thukho')    || '',
      ketoan:    p.get('ketoan')    || '',
      giamdoc:   p.get('giamdoc')   || '',
    };
  }

  window.addEventListener('DOMContentLoaded', function () {
    const { tieude, ngay, donvi, daidien, dienthoai, lydo,
            data, qrdata, nhangiao, nguoigiao, thukho, ketoan, giamdoc } = getParams();

    document.getElementById('txt-tieude').textContent = tieude;
    document.title = tieude;

    // --- QR code theo qrdata ---
    if (qrdata) {
      const qrUrl = 'https://api.qrserver.com/v1/create-qr-code/?size=120x120&margin=2&data=' + encodeURIComponent(qrdata);
      document.getElementById('qr-img').src = qrUrl;
      document.getElementById('qr-label').textContent = qrdata;
    } else {
      document.getElementById('header-right').style.display = 'none';
    }

    // --- Ngày ---
    let ngayHienThi = ngay;
    if (/^\d{1,2}\/\d{1,2}\/\d{4}$/.test(ngay)) {
      const parts = ngay.split('/');
      if (parseInt(parts[0]) <= 12 && parseInt(parts[1]) > 12) {
        ngayHienThi = parts[1] + '/' + parts[0] + '/' + parts[2];
      }
    }
    document.getElementById('txt-ngay').textContent = ngayHienThi;

    // --- Các dòng thông tin ---
    document.getElementById('txt-donvi').textContent     = donvi;
    document.getElementById('txt-daidien').textContent   = daidien;
    document.getElementById('txt-dienthoai').textContent = dienthoai;
    document.getElementById('txt-lydo').textContent      = lydo;

    // --- Tên người ký ---
    document.getElementById('ten-nguoigiao').textContent = nguoigiao;
    document.getElementById('label-nguoigiao').textContent = nhangiao;
    document.getElementById('ten-thukho').textContent    = thukho;
    document.getElementById('ten-ketoan').textContent    = ketoan;
    document.getElementById('ten-giamdoc').textContent   = giamdoc;

    // --- Bảng dữ liệu ---
    const tbody = document.getElementById('main-tbody');
    tbody.innerHTML = '';

    if (data) {
      const rows = data.split('_b_');
      rows.forEach(function (row, idx) {
        if (!row.trim()) return;
        const cols = row.split('_a_');
        const tenHang = cols[0] || '';
        const dvt     = cols[1] || '';
        const soLuong = cols[2] || '';

        const tr = document.createElement('tr');
        tr.innerHTML =
          '<td class="col-stt">' + (idx + 1) + '</td>' +
          '<td class="col-ten">' + tenHang + '</td>' +
          '<td class="col-dvt">' + dvt + '</td>' +
          '<td class="col-sl">'  + soLuong + '</td>';
        tbody.appendChild(tr);
      });
    }
  });
</script>
</head>
<body>
<div class="page">

  <!-- Header -->
  <div class="header">
    <div class="header-logo">
      <img src="https://i.ibb.co/vvwJdGd6/Thiet-ke-chua-co-ten-1.png" alt="Logo">
    </div>
    <div class="header-center">
      <div class="title" id="txt-tieude">Phiếu Nhập Kho</div>
      <div class="subtitle">Ngày: <span id="txt-ngay"></span></div>
    </div>
    <div class="header-right" id="header-right">
      <img id="qr-img" src="" alt="QR Code">
      <div class="qr-label" id="qr-label"></div>
    </div>
  </div>

  <!-- Info -->
  <div class="info-line">Đơn vị: <span class="dotted" id="txt-donvi"></span></div>
  <div class="info-line">Đại diện: <span class="dotted" id="txt-daidien"></span></div>
  <div class="info-line">Số điện thoại: <span class="dotted" id="txt-dienthoai"></span></div>
  <div class="info-line">Lý do: <span class="dotted" id="txt-lydo"></span></div>

  <!-- Main table -->
  <table>
    <thead>
      <tr>
        <th class="col-stt">TT</th>
        <th class="col-ten">Tên hàng</th>
        <th class="col-dvt">ĐVT</th>
        <th class="col-sl">Số lượng</th>
      </tr>
    </thead>
    <tbody id="main-tbody">
      <!-- Filled by JS -->
    </tbody>
  </table>

  <!-- Signatures -->
  <div class="signatures">
    <div class="sig-col">
      <span id="label-nguoigiao">Người giao hàng</span><br>
      <span class="sub">(Ký, ghi rõ họ tên)</span>
      <span class="ten-ky" id="ten-nguoigiao"></span>
    </div>
    <div class="sig-col">
      Người thực hiện<br>
      <span class="sub">(Ký, ghi rõ họ tên)</span>
      <span class="ten-ky" id="ten-thukho"></span>
    </div>
    <div class="sig-col">
      Kế toán<br>
      <span class="sub">(Ký, ghi rõ họ tên)</span>
      <span class="ten-ky" id="ten-ketoan"></span>
    </div>
    <div class="sig-col">
      Giám đốc<br>
      <span class="sub">(Ký, ghi rõ họ tên)</span>
      <span class="ten-ky" id="ten-giamdoc"></span>
    </div>
  </div>

</div>

<button class="print-btn" onclick="window.print()">🖨 In phiếu</button>

</body>
</html>
